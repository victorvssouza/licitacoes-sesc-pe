<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<div id="sesc-licitacoes-container" class="sesc-licitacoes-grid">
  <div class="sesc-loading">Carregando licitações oficiais...</div>
</div>

<style>
.sesc-licitacoes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  font-family: Arial, sans-serif;
  color: #333333;
  max-width: 1200px;
  margin: 0 auto;
}

.sesc-loading {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px;
  font-size: 16px;
  color: #666;
}

.sesc-licitacao-card {
  background: #ffffff;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.sesc-licitacao-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
}

.sesc-card-header { margin-bottom: 15px; }

.sesc-badge {
  display: inline-block;
  padding: 4px 8px;
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  border-radius: 4px;
  margin-bottom: 10px;
}

.badge-aberto, .badge-andamento { background-color: #d4edda; color: #155724; }
.badge-julgamento, .badge-analise { background-color: #fff3cd; color: #856404; }
.badge-finalizado, .badge-concluido { background-color: #e2e3e5; color: #383d41; }

.sesc-licitacao-titulo {
  font-size: clamp(1.1rem, 1.5vw, 1.3rem);
  font-weight: bold;
  margin: 0;
  color: #004a80;
}

.sesc-licitacao-objeto {
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 12px;
}

.sesc-licitacao-data {
  font-size: 13px;
  color: #666666;
  margin-bottom: 15px;
}

.sesc-card-footer {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sesc-btn-sharepoint, .sesc-btn-externo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: bold;
  text-decoration: none;
  text-align: center;
  transition: background 0.2s ease;
}

.sesc-btn-sharepoint {
  background-color: #0078d4;
  color: #ffffff;
}

.sesc-btn-sharepoint:hover { background-color: #005a9e; }

.sesc-btn-externo {
  background-color: #f4f4f4;
  color: #333333;
  border: 1px solid #cccccc;
}

.sesc-btn-externo:hover { background-color: #e2e2e2; }

@media (max-width: 768px) {
  .sesc-licitacoes-grid { grid-template-columns: 1fr; }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // Aponta para a API interna segura que criamos no seu WordPress
  const localApiUrl = '/wp-json/sesc/v1/licitacoes';
  const container = document.getElementById('sesc-licitacoes-container');

  fetch(localApiUrl)
    .then(response => {
      if (!response.ok) throw new Error('Erro ao buscar dados locais.');
      return response.json();
    })
    .then(payload => {
      // Converte a string Base64 enviada pelo PHP de volta em ArrayBuffer para a biblioteca XLSX ler
      const binaryString = atob(payload.base64_data);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      
      const workbook = XLSX.read(bytes.buffer, { type: 'array' });
      const firstSheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[firstSheetName];
      const licitacoes = XLSX.utils.sheet_to_json(worksheet);

      container.innerHTML = '';

      if (licitacoes.length === 0) {
        container.innerHTML = '<div class="sesc-loading">Nenhuma licitação encontrada na planilha.</div>';
        return;
      }

/*      licitacoes.forEach(item => {
        const statusValue = item.status || 'Pendente';
        const statusClass = statusValue.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-');
        
        const cardHtml = `
          <div class="sesc-licitacao-card">
            <div class="sesc-card-header">
              <span class="sesc-badge badge-${statusClass}">${statusValue}</span>
              <h3 class="sesc-licitacao-titulo">${item.titulo || 'Sem Título'}</h3>
            </div>
            <div class="sesc-card-body">
              <p class="sesc-licitacao-objeto"><strong>Objeto:</strong> ${item.objeto || 'Não informado'}</p>
              <p class="sesc-licitacao-data"><strong>Abertura:</strong> ${item.data || 'Não informada'}</p>
            </div>
            <div class="sesc-card-footer">
              <a href="${item.link_sharepoint || '#'}" target="_blank" class="sesc-btn-sharepoint">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H5V8h14v10z"/>
                </svg>
                Documentos no SharePoint
              </a>
              ${item.link_externo ? `
                <a href="${item.link_externo}" target="_blank" class="sesc-btn-externo">Ir para Licitações-E (BB)</a>
              ` : ''}
            </div>
          </div>
        `;
        container.innerHTML += cardHtml;
      });
    })
    .catch(error => {
      console.error('Erro:', error);
      container.innerHTML = '<div class="sesc-loading">Erro ao carregar as informações das licitações.</div>';
    });
});
*/

// ... (mantenha o código anterior igual até a linha do licitacoes.forEach) ...

      licitacoes.forEach(item => {
        // PULO DO GATO: Se a coluna 'publicado' não for 'Sim', ignora essa linha e vai para a próxima
        if (!item.publicado || item.publicado.trim().toLowerCase() !== 'sim') {
          return; // Ignora esta licitação (funciona como rascunho)
        }

        // Daqui para baixo o código continua exatamente o mesmo...
        const statusValue = item.status || 'Pendente';
        const statusClass = statusValue.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-');
        
        const cardHtml = `
          <div class="sesc-licitacao-card">
            <div class="sesc-card-header">
              <span class="sesc-badge badge-${statusClass}">${statusValue}</span>
              <h3 class="sesc-licitacao-titulo">${item.titulo || 'Sem Título'}</h3>
            </div>
            <div class="sesc-card-body">
              <p class="sesc-licitacao-objeto"><strong>Objeto:</strong> ${item.objeto || 'Não informado'}</p>
              <p class="sesc-licitacao-data"><strong>Abertura:</strong> ${item.data || 'Não informada'}</p>
            </div>
            <div class="sesc-card-footer">
              <a href="${item.link_sharepoint || '#'}" target="_blank" class="sesc-btn-sharepoint">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H5V8h14v10z"/>
                </svg>
                Documentos no SharePoint
              </a>
              ${item.link_externo ? `
                <a href="${item.link_externo}" target="_blank" class="sesc-btn-externo">Ir para Licitações-E (BB)</a>
              ` : ''}
            </div>
          </div>
        `;
        container.innerHTML += cardHtml;
      });

      // Se depois de filtrar tudo o container continuar vazio
      if (container.innerHTML === '') {
        container.innerHTML = '<div class="sesc-loading">Nenhuma licitação publicada no momento.</div>';
      }
    })
    .catch(error => {
      console.error('Erro:', error);
      container.innerHTML = '<div class="sesc-loading">Erro ao carregar as informações das licitações.</div>';
    });
});
</script>
